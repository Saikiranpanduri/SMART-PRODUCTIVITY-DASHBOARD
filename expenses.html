<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses - Smart Productivity Dashboard</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .expense-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 24px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .expense-layout {
                grid-template-columns: 1fr;
            }
        }

        .balance-card {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
            margin-bottom: 24px;
        }

        .balance-title {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 10px;
        }

        .balance-amount {
            font-size: 42px;
            font-weight: 700;
            background: var(--text-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .balance-amount.positive { color: var(--success-color); -webkit-text-fill-color: var(--success-color); }
        .balance-amount.negative { color: var(--danger-color); -webkit-text-fill-color: var(--danger-color); }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .summary-item { text-align: center; width: 50%; }
        .summary-item:first-child { border-right: 1px solid rgba(255,255,255,0.1); }
        
        .summary-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .summary-val.income { color: var(--success-color); font-size: 20px; font-weight: 600; margin-top: 5px; }
        .summary-val.expense { color: var(--danger-color); font-size: 20px; font-weight: 600; margin-top: 5px; }

        .transaction-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-row {
            display: flex;
            gap: 16px;
        }

        .form-row > div {
            flex: 1;
        }

        .transaction-list {
            margin-top: 24px;
            list-style: none;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid var(--glass-border);
            transition: background 0.2s;
        }

        .transaction-item:hover {
            background: rgba(255,255,255,0.02);
        }

        .transaction-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .transaction-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .transaction-icon.income { background: rgba(34, 197, 94, 0.2); color: var(--success-color); }
        .transaction-icon.expense { background: rgba(239, 68, 68, 0.2); color: var(--danger-color); }

        .transaction-details h4 { font-size: 15px; font-weight: 500; }
        .transaction-details p { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

        .transaction-amount { font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 16px; }
        .transaction-amount.income { color: var(--success-color); }
        .transaction-amount.expense { color: var(--danger-color); }

        .delete-btn {
            background: none;
            border: none;
            color: var(--danger-color);
            opacity: 0;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .transaction-item:hover .delete-btn {
            opacity: 1;
        }

        select.glass-input, input[type="date"].glass-input {
            appearance: none;
        }
        
        select.glass-input option {
            background: #1e293b;
            color: white;
        }
    </style>
</head>
<body>
    <script src="js/auth.js"></script>
    <div class="app-container">
        <!-- Sidebar injected via JS -->
        <div id="sidebar-container"></div>
        
        <main class="main-content">
            <!-- Header injected via JS -->
            <div id="header-container"></div>
            
            <div class="content-area expense-layout">
                <!-- Left Column: Transactions -->
                <div>
                    <div class="balance-card glass-panel">
                        <div class="balance-title">Total Balance</div>
                        <div class="balance-amount" id="totalBalance">$0.00</div>
                        
                        <div class="summary-row">
                            <div class="summary-item">
                                <div class="summary-label">Income</div>
                                <div class="summary-val income" id="totalIncome">+$0.00</div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-label">Expense</div>
                                <div class="summary-val expense" id="totalExpense">-$0.00</div>
                            </div>
                        </div>
                    </div>

                    <div class="glass-panel" style="padding: 24px;">
                        <h3 style="margin-bottom: 20px;">Recent Transactions</h3>
                        <div id="transactionList" class="transaction-list">
                            <!-- Transactions Injected Here -->
                        </div>
                    </div>
                </div>

                <!-- Right Column: Add Form & Chart -->
                <div>
                    <div class="glass-panel" style="padding: 24px; margin-bottom: 24px;">
                        <h3 style="margin-bottom: 20px;">Add Transaction</h3>
                        <form id="expenseForm" class="transaction-form">
                            <div>
                                <label style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; display: block;">Type</label>
                                <select id="transType" class="glass-input" required>
                                    <option value="expense">Expense</option>
                                    <option value="income">Income</option>
                                </select>
                            </div>
                            
                            <div>
                                <label style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; display: block;">Description</label>
                                <input type="text" id="transDesc" class="glass-input" placeholder="e.g. Groceries" required>
                            </div>

                            <div class="form-row">
                                <div>
                                    <label style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; display: block;">Amount</label>
                                    <input type="number" id="transAmount" class="glass-input" placeholder="0.00" step="0.01" min="0.01" required>
                                </div>
                                <div>
                                    <label style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; display: block;">Category</label>
                                    <select id="transCat" class="glass-input" required>
                                        <option value="Food">Food</option>
                                        <option value="Transport">Transport</option>
                                        <option value="Shopping">Shopping</option>
                                        <option value="Bills">Bills</option>
                                        <option value="Entertainment">Entertainment</option>
                                        <option value="Salary">Salary</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                            </div>

                            <button type="submit" class="glass-button" style="margin-top: 10px;">Add Transaction</button>
                        </form>
                    </div>

                    <div class="glass-panel" style="padding: 24px;">
                        <h3 style="margin-bottom: 20px;">Expense Overview</h3>
                        <div style="height: 250px;">
                            <canvas id="expenseChartCanvas"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/ui.js"></script>
    <script src="js/expenses.js"></script>
</body>
</html>
