<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - Smart Productivity Dashboard</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .notes-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 24px;
            height: calc(100vh - 120px);
        }

        .notes-sidebar {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .notes-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .note-item {
            padding: 16px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
        }

        .note-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .note-item.active {
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid var(--accent-color);
        }

        .note-item-title {
            font-weight: 600;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-item-preview {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-item-date {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
            text-align: right;
        }

        .note-editor {
            display: flex;
            flex-direction: column;
        }

        .editor-toolbar {
            padding: 16px 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-toolbar input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            font-weight: 600;
            outline: none;
            width: 100%;
        }

        .editor-actions {
            display: flex;
            gap: 10px;
        }

        .editor-actions button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .editor-actions button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .editor-actions button.delete-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger-color);
            border-color: var(--danger-color);
        }

        .editor-content {
            flex: 1;
            padding: 20px;
        }

        .editor-content textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            line-height: 1.6;
            outline: none;
            resize: none;
            font-family: inherit;
        }

        .empty-editor-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
        }

        .empty-editor-overlay i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 900px) {
            .notes-container {
                grid-template-columns: 1fr;
                height: auto;
            }
            .notes-sidebar {
                height: 300px;
            }
            .note-editor {
                height: 500px;
            }
        }
    </style>
</head>
<body>
    <script src="js/auth.js"></script>
    <div class="app-container">
        <!-- Sidebar injected via JS -->
        <div id="sidebar-container"></div>
        
        <main class="main-content">
            <!-- Header injected via JS -->
            <div id="header-container"></div>
            
            <div class="content-area notes-container">
                <!-- Notes List -->
                <div class="notes-sidebar glass-panel">
                    <div class="notes-header">
                        <h3 style="font-size: 16px;">My Notes</h3>
                        <button id="newNoteBtn" class="glass-button" style="padding: 8px 12px; font-size: 14px;">
                            <i class="fas fa-plus"></i> New
                        </button>
                    </div>
                    <div id="notesList" class="notes-list">
                        <!-- Notes List Injected Here -->
                    </div>
                </div>

                <!-- Note Editor -->
                <div class="note-editor glass-panel" id="noteEditor">
                    <!-- Editor or Empty State Injected Here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/ui.js"></script>
    <script src="js/notes.js"></script>
</body>
</html>
