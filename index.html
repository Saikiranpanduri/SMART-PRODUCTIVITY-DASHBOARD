<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart Productivity Dashboard</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .stat-info h3 {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .stat-info .value {
            font-size: 28px;
            font-weight: 700;
        }
        
        .charts-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }
        
        @media (max-width: 900px) {
            .charts-container {
                grid-template-columns: 1fr;
            }
        }
        
        .chart-card {
            padding: 24px;
        }
        
        .chart-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .quick-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 14px;
        }
        
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <script src="js/auth.js"></script>
    <div class="app-container">
        <!-- Sidebar injected via JS -->
        <div id="sidebar-container"></div>
        
        <main class="main-content">
            <!-- Header injected via JS -->
            <div id="header-container"></div>
            
            <div class="content-area">
                <div class="dashboard-grid">
                    <div class="stat-card glass-panel">
                        <div class="stat-icon" style="color: #3b82f6;">
                            <i class="fas fa-tasks"></i>
                        </div>
                        <div class="stat-info">
                            <h3>Total Tasks</h3>
                            <div class="value" id="stat-tasks">0</div>
                        </div>
                    </div>
                    
                    <div class="stat-card glass-panel">
                        <div class="stat-icon" style="color: #a855f7;">
                            <i class="fas fa-sticky-note"></i>
                        </div>
                        <div class="stat-info">
                            <h3>Total Notes</h3>
                            <div class="value" id="stat-notes">0</div>
                        </div>
                    </div>
                    
                    <div class="stat-card glass-panel">
                        <div class="stat-icon" style="color: #22c55e;">
                            <i class="fas fa-wallet"></i>
                        </div>
                        <div class="stat-info">
                            <h3>Total Expenses</h3>
                            <div class="value" id="stat-expenses">$0</div>
                        </div>
                    </div>
                </div>
                
                <div class="charts-container">
                    <div class="chart-card glass-panel">
                        <div class="chart-header">
                            <h3>Task Completion Trend</h3>
                        </div>
                        <div style="height: 300px; display: flex; align-items: center; justify-content: center;">
                            <canvas id="tasksChart"></canvas>
                        </div>
                    </div>
                    
                    <div class="chart-card glass-panel">
                        <div class="chart-header">
                            <h3>Expense Distribution</h3>
                        </div>
                        <div style="height: 300px; display: flex; align-items: center; justify-content: center;">
                            <canvas id="expensesChart"></canvas>
                        </div>
                    </div>
                </div>
                
                <div class="quick-actions">
                    <a href="tasks.html" class="action-btn">
                        <i class="fas fa-plus"></i> New Task
                    </a>
                    <a href="notes.html" class="action-btn">
                        <i class="fas fa-pen"></i> Write Note
                    </a>
                    <a href="expenses.html" class="action-btn">
                        <i class="fas fa-receipt"></i> Add Expense
                    </a>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/ui.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
