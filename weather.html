<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather - Smart Productivity Dashboard</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .weather-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .search-box button {
            padding: 0 24px;
        }

        .weather-card {
            padding: 40px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(59, 130, 246, 0.2));
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .weather-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .weather-card:hover::before {
            opacity: 1;
        }

        .weather-icon-lg {
            font-size: 80px;
            margin-bottom: 20px;
            color: white;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .temp-main {
            font-size: 64px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 5px;
        }

        .weather-desc {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            text-transform: capitalize;
            margin-bottom: 5px;
        }

        .city-name {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.8);
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 30px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .detail-item i {
            color: rgba(255,255,255,0.7);
            font-size: 20px;
        }

        .detail-value {
            font-weight: 600;
            font-size: 16px;
        }

        .detail-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
        }

        .loading-state, .error-state, .empty-state {
            padding: 60px 20px;
        }

        .error-state { color: var(--danger-color); }
        .loading-state i { 
            font-size: 40px; 
            color: var(--accent-color);
            margin-bottom: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <script src="js/auth.js"></script>
    <div class="app-container">
        <!-- Sidebar injected via JS -->
        <div id="sidebar-container"></div>
        
        <main class="main-content">
            <!-- Header injected via JS -->
            <div id="header-container"></div>
            
            <div class="content-area weather-container">
                <form id="weatherForm" class="search-box">
                    <input type="text" id="cityInput" class="glass-input" placeholder="Enter city name..." required>
                    <button type="submit" class="glass-button"><i class="fas fa-search"></i></button>
                </form>

                <div id="weatherResult" class="glass-panel" style="min-height: 400px;">
                    <div class="empty-state">
                        <i class="fas fa-cloud-sun" style="font-size: 64px; opacity: 0.3; margin-bottom: 20px;"></i>
                        <h3 style="color: var(--text-secondary);">Search for a city</h3>
                        <p style="color: rgba(255,255,255,0.4); font-size: 14px;">Get real-time weather information instantly.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/ui.js"></script>
    <script src="js/weather.js"></script>
</body>
</html>
