<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Smart Productivity Dashboard</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/auth.js"></script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Start managing your productivity today</p>
            </div>
            
            <form id="signupForm" class="auth-form">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="glass-input" placeholder="John Doe" required>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="glass-input" placeholder="you@example.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="glass-input" placeholder="••••••••" required minlength="6">
                </div>
                
                <div id="errorMsg" class="text-error">Email already in use.</div>
                
                <button type="submit" class="glass-button">Sign Up</button>
            </form>
            
            <div class="auth-link">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.style.display = 'none';
            
            // Get existing users
            const users = JSON.parse(localStorage.getItem('smart_dashboard_db_users') || '[]');
            
            // Check if user exists
            if (users.some(u => u.email === email)) {
                errorMsg.style.display = 'block';
                return;
            }
            
            // Create new user
            const newUser = {
                id: Date.now().toString(),
                name,
                email,
                password // Note: In a real app, never store plain text passwords!
            };
            
            // Save to DB
            users.push(newUser);
            localStorage.setItem('smart_dashboard_db_users', JSON.stringify(users));
            
            // Set session
            const sessionUser = {
                id: newUser.id,
                name: newUser.name,
                email: newUser.email
            };
            localStorage.setItem('smart_dashboard_user', JSON.stringify(sessionUser));
            
            // Add button animation before redirect
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 800);
        });
    </script>
</body>
</html>
