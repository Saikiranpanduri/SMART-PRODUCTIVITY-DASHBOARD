<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Smart Productivity Dashboard</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .profile-card {
            padding: 40px;
            text-align: center;
        }

        .profile-avatar-lg {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--accent-gradient);
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: white;
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.4);
            position: relative;
        }

        .profile-avatar-lg::after {
            content: '\\f030';
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            position: absolute;
            bottom: 0;
            right: 0;
            background: #1e293b;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            border: 2px solid var(--text-primary);
            transition: all 0.2s;
        }

        .profile-avatar-lg::after:hover {
            background: var(--accent-color);
            border-color: var(--accent-color);
        }

        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-actions {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--glass-border);
        }

        .success-msg {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success-color);
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
    </style>
</head>
<body>
    <script src="js/auth.js"></script>
    <div class="app-container">
        <!-- Sidebar injected via JS -->
        <div id="sidebar-container"></div>
        
        <main class="main-content">
            <!-- Header injected via JS -->
            <div id="header-container"></div>
            
            <div class="content-area profile-container">
                <div class="glass-panel profile-card">
                    <div class="profile-avatar-lg" id="profileAvatar">U</div>
                    
                    <form id="profileForm">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="profileName" class="glass-input" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="profileEmail" class="glass-input" disabled style="opacity: 0.6; cursor: not-allowed;" title="Email cannot be changed">
                        </div>

                        <div class="form-group">
                            <label>Member Since</label>
                            <input type="text" class="glass-input" value="March 2024" disabled style="opacity: 0.6; cursor: not-allowed;">
                        </div>

                        <div id="successMsg" class="success-msg">
                            <i class="fas fa-check-circle"></i> Profile updated successfully!
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="glass-button">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Inject Layout
            document.getElementById('sidebar-container').innerHTML = injectSidebar();
            document.getElementById('header-container').innerHTML = injectHeader('Profile Settings', 'Manage your personal information');
            
            // Populate data
            if (currentUser) {
                document.getElementById('profileName').value = currentUser.name || '';
                document.getElementById('profileEmail').value = currentUser.email || '';
                document.getElementById('profileAvatar').textContent = currentUser.name ? currentUser.name.charAt(0).toUpperCase() : 'U';
            }

            // Handle Save
            document.getElementById('profileForm').addEventListener('submit', (e) => {
                e.preventDefault();
                
                const newName = document.getElementById('profileName').value.trim();
                if(!newName) return;

                // Update Session
                currentUser.name = newName;
                localStorage.setItem('smart_dashboard_user', JSON.stringify(currentUser));
                
                // Update DB entry
                const users = JSON.parse(localStorage.getItem('smart_dashboard_db_users') || '[]');
                const dbUserIndex = users.findIndex(u => u.id === currentUser.id);
                if (dbUserIndex !== -1) {
                    users[dbUserIndex].name = newName;
                    localStorage.setItem('smart_dashboard_db_users', JSON.stringify(users));
                }

                // Update UI visually
                document.getElementById('header-user-name').textContent = newName;
                const newAvatar = newName.charAt(0).toUpperCase();
                document.getElementById('header-avatar').textContent = newAvatar;
                document.getElementById('profileAvatar').textContent = newAvatar;

                // Show success
                const msg = document.getElementById('successMsg');
                msg.style.display = 'block';
                setTimeout(() => {
                    msg.style.display = 'none';
                }, 3000);
            });
        });
    </script>
</body>
</html>
